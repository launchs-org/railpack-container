name: Update Railpack Version List

on:
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
        # token の指定を削除（デフォルトの GITHUB_TOKEN を使用）

      - name: Goのセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: リストの更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run fetch_and_generate.go

      - name: 変更をコミットとプッシュ
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # workflows は含まず、json だけを追加
          git add railpack_releases.json
          git diff --staged --exit-code || (git commit -m "chore: update railpack version list" && git push)
